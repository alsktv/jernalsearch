
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>하위 논문(참고문헌) 탐색기</title>
  <style>
    :root{--bg:#f4f7f6;--card:#ffffff;--accent:#2563eb;--muted:#9aa4a8}
    html,body{height:100%;margin:0;font-family:Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:var(--bg);color:#0f172a}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{background:var(--card);max-width:650px;width:100%;border-radius:12px;padding:28px;box-shadow:0 10px 30px rgba(16,24,40,0.08);transition:transform .18s ease}
    h1{margin:0 0 6px;font-size:20px}
    .subtitle{margin:0 0 18px;color:var(--muted);font-size:13px}
    form{display:flex;flex-direction:column;gap:12px}
    label{font-size:13px;color:#1f2937}
    input[type="text"]{padding:12px 14px;border:1px solid #e6eef0;border-radius:8px;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
    input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,0.08)}
    button{margin-top:6px;padding:12px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;transition:background .18s,transform .08s}
    button:disabled{opacity:0.7;cursor:wait}
    button:hover:not(:disabled){background:#1e40af}

    /* Loader */
    .loader{display:flex;align-items:center;gap:12px;margin-top:12px}
    .spinner{width:20px;height:20px;border-radius:50%;border:3px solid rgba(0,0,0,0.08);border-top-color:var(--accent);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .results{margin-top:18px;display:flex;flex-direction:column;gap:12px}
    .paper{padding:14px;border-radius:10px;background:#fbfeff;border:1px solid #eef6f7}
    .paper-title{font-weight:700;margin:0 0 6px}
    .paper-meta{color:var(--muted);font-size:13px}

    .fade-enter{opacity:0;transform:translateY(6px)}
    .fade-enter.fade-enter-active{opacity:1;transform:none;transition:all .22s ease}

    .error{margin-top:12px;padding:12px;border-radius:10px;background:#fff5f5;color:#7f1d1d;border:1px solid #fee2e2}

    @media (max-width:420px){.card{padding:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <h1>🔍 하위 논문(참고문헌) 탐색기</h1>
      <p class="subtitle">수동으로 찾은 논문의 Reference 리스트를 시각화합니다.</p>

      <form id="searchForm">
        <label for="title">원본 논문 제목 (Seed Paper Title)</label>
        <input id="title" name="title" type="text" placeholder="예: Attention Is All You Need" autocomplete="off" />
        <button id="searchBtn" type="submit">하위 논문 리스트 찾기</button>
      </form>

      <div id="loading" style="display:none" aria-live="polite">
        <div class="loader">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loading-text">Gemini 에이전트가 인터넷을 통해 논문을 탐색 중입니다...</div>
        </div>
      </div>

      <div id="messageArea"></div>
      <div id="results" class="results" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const titleInput = document.getElementById('title');
    const searchBtn = document.getElementById('searchBtn');
    const loadingEl = document.getElementById('loading');
    const resultsEl = document.getElementById('results');
    const messageArea = document.getElementById('messageArea');

    function showLoading(show){
      loadingEl.style.display = show ? 'block' : 'none';
      searchBtn.disabled = show;
    }

    function showError(text){
      messageArea.innerHTML = `<div class="error">${text}</div>`;
    }

    function clearMessages(){
      messageArea.innerHTML = '';
      resultsEl.innerHTML = '';
    }

    function renderReferences(list){
      resultsEl.innerHTML = '';
      list.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'paper fade-enter';
        div.innerHTML = `<div class="paper-title">${p.title}</div><div class="paper-meta">${p.authors} | ${p.year}</div>`;
        resultsEl.appendChild(div);
        // trigger enter animation
        requestAnimationFrame(() => div.classList.add('fade-enter-active'));
      });
    }

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      clearMessages();
      const title = titleInput.value.trim();
      if(!title){
        showError('검색할 원본 논문 제목을 입력해 주세요.');
        return;
      }

      showLoading(true);

      try{
        const resp = await fetch('/api/find-references', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({title})
        });

        const data = await resp.json();
        showLoading(false);

        if(!resp.ok){
          showError(data.error || '하위 논문을 찾지 못했습니다.');
          return;
        }

        if(data.references && data.references.length){
          renderReferences(data.references);
        } else {
          showError('하위 논문을 찾지 못했습니다.');
        }
      } catch (err){
        showLoading(false);
        showError('네트워크 오류가 발생했습니다. 다시 시도해 주세요.');
        console.error(err);
      }
    });
  </script>
</body>
</html>
